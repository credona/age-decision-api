services:
  age-decision-core:
    image: ghcr.io/credona/age-decision-core:latest
    networks:
      - age-decision-network

  age-decision-antispoof:
    image: ghcr.io/credona/age-decision-antispoof:latest
    networks:
      - age-decision-network

  age-decision-api:
    image: ghcr.io/credona/age-decision-api:latest
    ports:
      - "${APP_PORT:-8002}:8000"
    env_file:
      - .env
    depends_on:
      - age-decision-core
      - age-decision-antispoof
    restart: unless-stopped
    networks:
      - age-decision-network

networks:
  age-decision-network:
    name: age-decision-network
    driver: bridge
